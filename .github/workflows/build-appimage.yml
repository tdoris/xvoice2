name: Build AppImage

# Builds the XVoice2 AppImage on an older glibc base for portability, and
# publishes it to a GitHub Release when a version tag (v*) is pushed.
#
#   Publish a release:   git tag v0.2.0 && git push origin v0.2.0
#   Test a build only:   run this workflow manually (workflow_dispatch)

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # needed to create releases

jobs:
  build:
    # Ubuntu 22.04 = glibc 2.35, so the AppImage runs on Ubuntu 22.04+,
    # Debian 12+, Fedora 36+, Mint 21+, and most other current distros.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y portaudio19-dev python3-dev libxcb-cursor0

      - name: Install XVoice2 and build tools
        run: |
          python -m pip install --upgrade pip
          pip install -e .[gui,parakeet] pyinstaller

      - name: Build AppImage
        run: bash packaging/build_appimage.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: XVoice2-x86_64.AppImage
          path: packaging/XVoice2-x86_64.AppImage
          if-no-files-found: error

      - name: Publish to Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            packaging/XVoice2-x86_64.AppImage \
            --title "XVoice2 ${{ github.ref_name }}" \
            --generate-notes
